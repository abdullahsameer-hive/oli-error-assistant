id: 'we_apologize_for_the_inconvenience_we_cannot_ship_the_order_because_there_are_cu'
title: 'We apologize for the inconvenience. We cannot ship the order because there are currently no shipping services available for the recipient address. Please validate the recipient address and try again. If address is accurate, please ship these orders with a different shipping provider. (Code: A-300)'
patterns:
  - 'We apologize for the inconvenience. We cannot ship the order because there are currently no shipping services available for the recipient address. Please validate the recipient address and try again. If address is accurate, please ship these orders with a different shipping provider. (Code: A-300)'
fixSteps:
  - 'If the Label API logs on AA contain “NO COVERAGE”, switch to GLS.'
  - 'If the shipping method is Amazon IT Mainland, select GLS IT National Express Mainland.'
  - 'If the shipping method is Amazon IT Sicily Calabria Sardinia, select GLS IT National Express Sicily Calabria or GLS IT National Express Sardinia depending on the location (check on Google Maps).'
fc: '🇮🇹 MIL1'
