<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OLI Error Assistant</title>
    <meta name="manifest.type" content="browser_action" />
  
<!-- OLI_UI_V1 -->
<style>
  :root{
    --bg:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --border:#e5e7eb;
    --card:#f9fafb;
    --shadow:0 1px 2px rgba(0,0,0,.06);
    --radius:12px;
  }

  html, body { margin:0; padding:0; background:var(--bg); color:var(--text); }
  body{
    width: 360px;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    font-size: 13px;
    line-height: 1.4;
    padding: 12px;
  }

  h3{
    margin: 14px 0 6px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .02em;
    text-transform: uppercase;
  }

  #runBtn, #searchBtn, #refreshBtn, button{
    background: #111827;
    color: #fff;
    border: 1px solid #111827;
    border-radius: 10px;
    padding: 8px 10px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  #runBtn:disabled{ opacity:.55; cursor:not-allowed; }

  #searchInput, input[type="text"]{
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    outline: none;
    background: #fff;
  }

  /* Make the top row align nicely if you have Search input + button */
  .row{
    display:flex;
    gap:8px;
    align-items:center;
  }
  .row #searchInput{ flex:1; }

  pre{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    color: #111827;
  }
  #status{ color: var(--muted); }
  #kbinfo{ color: var(--muted); }

  /* Result cards created by renderMatch */
  #results > div{
    border: 1px solid var(--border) !important;
    background: #fff;
    border-radius: var(--radius) !important;
    padding: 12px !important;
    margin-top: 10px !important;
    box-shadow: var(--shadow);
  }

  #results > div > div:first-child{
    font-size: 13px;
    font-weight: 800;
  }

  #results ol{
    margin: 10px 0 0 18px;
    padding: 0;
  }
  #results li{ margin: 6px 0; }

  /* Link buttons inside results */
  #results a{
    display:inline-block;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 10px;
    text-decoration: none;
    color: #111827;
    background: #fff;
    box-shadow: var(--shadow);
  }
  #results a:hover{ background: var(--card); }

  /* FC chip row if present */
  #results span{
    font-size: 12px !important;
  }

/* OLI_HINTS_V1 */
#hints{
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.hint{
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px;
  background: rgba(255,255,255,0.9);
  box-shadow: var(--shadow);
  color: var(--text);
}
.hint b{ font-weight: 800; }

/* OLI_HEADER_V1 */
#oliHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom: 10px;
}

#oliTitle{
  font-size: 14px;
  font-weight: 900;
  letter-spacing: .2px;
  color: #111827;
}

#helpBtn{
  display:inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.9);
  text-decoration:none;
  color:#111827;
  font-weight: 800;
  box-shadow: var(--shadow);
}
#helpBtn:hover{
  background: rgba(255,255,255,1);
}

/* OLI_QOL_V1 */
#pageContext{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:10px;
  margin-bottom:6px;
}
.chip{
  display:inline-block;
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.9);
  font-weight: 800;
  color: #111827;
  box-shadow: var(--shadow);
  font-size: 12px;
}

.btn-secondary{
  background: rgba(255,255,255,0.9) !important;
  color: #111827 !important;
  border: 1px solid var(--border) !important;
}

#noMatchPanel{
  border: 1px dashed var(--border);
  border-radius: 14px;
  padding: 12px;
  margin-top: 10px;
  background: rgba(255,255,255,0.85);
  box-shadow: var(--shadow);
}
#noMatchPanel b{ font-weight: 900; }
#noMatchPanel .actions{
  margin-top: 8px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
#noMatchPanel .small{
  color: var(--muted);
  margin-top: 6px;
}

/* OLI_COLLAPSIBLE_CSS */
details.collapsible{
  margin-top: 10px;
}
details.collapsible > summary{
  cursor: pointer;
  user-select: none;
  font-weight: 900;
  color: #111827;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255,255,255,0.85);
  box-shadow: var(--shadow);
  list-style: none;
}
details.collapsible > summary::-webkit-details-marker{ display:none; }
details.collapsible[open] > summary{
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 10px;
}
details.collapsible pre{
  margin-top: 8px;
}

/* OLI_DARKMODE_V1 */
:root{
  --bg:#ffffff;
  --fg:#111827;
  --muted:#6b7280;
  --panel: rgba(255,255,255,0.88);
  --panel2: rgba(255,255,255,0.85);
}

/* Default to system theme */
@media (prefers-color-scheme: dark){
  :root{
    --bg:#000000;
    --fg:#f3f4f6;
    --muted:#9ca3af;
    --panel: rgba(17,24,39,0.78);
    --panel2: rgba(17,24,39,0.72);
  }
}

/* Manual toggle overrides */
body.dark{
  --bg:#000000;
  --fg:#f3f4f6;
  --muted:#9ca3af;
  --panel: rgba(17,24,39,0.78);
  --panel2: rgba(17,24,39,0.72);
}
body.light{
  --bg:#ffffff;
  --fg:#111827;
  --muted:#6b7280;
  --panel: rgba(255,255,255,0.88);
  --panel2: rgba(255,255,255,0.85);
}

/* Apply vars */
body{
  background: var(--bg);
}
#app{
  background: var(--panel);
}
details.collapsible > summary{
  background: var(--panel2);
  color: var(--fg);
}
pre{
  background: var(--panel2);
  color: var(--fg);
}
#status, #kbinfo{
  color: var(--muted);
}
#oliTitle{
  color: var(--fg);
}

/* OLI_TEXT_TONE_V1 */
/* Make main heading black */
#oliTitle{
  color: #000 !important;
}

/* Make these headings darker: CAPTURED TEXT, STATUS, HINTS, MATCHES (all are h3/summary) */
h3{
  color: #111827 !important;
  opacity: 0.92;
}

/* Collapsible summary headers darker too */
details.collapsible > summary{
  color: #111827 !important;
}

/* Muted text slightly darker (status/kb info labels still readable) */
#status, #kbinfo{
  color: rgba(17,24,39,0.75) !important;
}

/* OLI_PILL_SUMMARY_TEXT_V1 */
/* Keep main headings dark (h3), but make the pill (collapsible summary) text white */
details.collapsible > summary{
  color: #ffffff !important;
}

/* OLI_UI_CLEAN_V1 */

/* Neutral palette */
:root{
  --oli-yellow:#FFDF39;
  --oli-bg:#f4f4f5;
  --oli-panel:#ffffff;
  --oli-text:#0b0f1a;
  --oli-muted:#4b5563;
  --oli-border:#d1d5db;
  --oli-darkpill:#374151;
  --oli-darkpillText:#ffffff;
}

/* Main container: keep layout, make it cleaner */
body{
  color: var(--oli-text);
}
#app{
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

/* Section headings (CAPTURED TEXT, STATUS, HINTS, MATCHES) */
h3{
  color: rgba(17,24,39,0.9) !important;
  letter-spacing: 0.02em;
}

/* Buttons */
#runBtn{
  background: var(--oli-yellow) !important;
  border: 1px solid rgba(0,0,0,0.12) !important;
  color: #111827 !important;
}
.btn-secondary, #refreshBtn, #searchBtn{
  border: 1px solid rgba(0,0,0,0.12) !important;
  box-shadow: 0 6px 14px rgba(0,0,0,0.08) !important;
}

/* Inputs and "white pill" fields */
input, pre{
  border: 1px solid rgba(0,0,0,0.10) !important;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06) !important;
}

/* Collapsible pill headers: remove double border look */
details.collapsible > summary{
  background: var(--oli-darkpill) !important;
  color: var(--oli-darkpillText) !important;

  /* Single border only */
  border: 1px solid rgba(255,255,255,0.18) !important;

  /* Remove stacked shadows/outlines that create double border */
  box-shadow: none !important;
  outline: none !important;
}

/* Remove focus ring double-outline on summaries (keep a subtle focus) */
details.collapsible > summary:focus{
  box-shadow: 0 0 0 2px rgba(255,223,57,0.55) !important;
}

/* The content inside collapsibles */
details.collapsible pre{
  background: rgba(255,255,255,0.9) !important;
  color: var(--oli-text) !important;
  border: 1px solid rgba(0,0,0,0.10) !important;
}

/* Chips (FC/Country/Carrier) */
.chip{
  background: rgba(255,255,255,0.92) !important;
  border: 1px solid rgba(0,0,0,0.10) !important;
  color: #111827 !important;
  box-shadow: 0 4px 10px rgba(0,0,0,0.06) !important;
}

/* Match cards: slightly cleaner borders */
#results > div{
  border: 1px solid rgba(0,0,0,0.10) !important;
  box-shadow: 0 10px 24px rgba(0,0,0,0.10) !important;
}
</style>

</style>
</head>
  <body>
  <div id="app">
    <div id="oliHeader">
      <div id="oliTitle">OLI Error Scanner</div>
      <a id="helpBtn" href="https://www.notion.so/hivetechnologies/OLI-Knowledge-base-Tool-31a0c0de327d80c7a8b1e9c0d9ba24e1?source=copy_link" target="_blank" rel="noopener noreferrer">Help</a>
      <button id="themeToggle" class="btn-secondary" type="button" style="padding:6px 10px; border-radius:999px;">Theme</button>
    </div>
<button id="runBtn">Capture and match</button>
    <button id="refreshBtn" style="margin-left:8px; padding:6px 10px; border:1px solid #ddd; border-radius:8px; cursor:pointer;">Refresh KB</button>
  <div style="margin:10px 0; display:flex; gap:8px;">
    <input id="searchInput" type="text" placeholder="Search errors (paste or type)" style="flex:1; padding:6px 8px; border:1px solid #ddd; border-radius:8px;" />
    <button id="searchBtn" style="padding:6px 10px; border:1px solid #ddd; border-radius:8px; cursor:pointer;">Search</button>
  </div>

    <div class="row" style="justify-content:space-between; margin-top:14px;">
        <h3 style="margin:0;">Captured text</h3>
        <button id="copyCapturedBtn" class="btn-secondary" type="button">Copy</button>
      </div>
    <!-- OLI_COLLAPSIBLE_V1 -->
    <details class="collapsible" id="capturedDetails" open>
      <summary>Captured text</summary>
      <pre id="captured"></pre>
    </details>

    <h3>Status</h3>
    <details class="collapsible" id="statusDetails" open>
      <summary>Status</summary>
      <pre id="status"></pre>
    </details>
    <details class="collapsible" id="kbDetails">
      <summary>KB info</summary>
      <pre id="kbinfo"></pre>
    </details>

    <div id="pageContext">
      <span class="chip" id="fcChip" style="display:none;"></span>
      <span class="chip" id="countryChip" style="display:none;"></span>
      <span class="chip" id="methodChip" style="display:none;"></span>
      <span class="chip" id="carrierChip" style="display:none;"></span>
    </div>


    <h3 id="hintsHeading">Hints</h3>
    <div id="hints"></div>


    <h3 id="matchesHeading">Matches</h3>
    <div id="noMatchPanel" style="display:none;"></div>
    <div id="results"></div>

    <button id="payloadToggle" type="button">Payload to DB</button>
    <div id="payloadWrap" style="display:none; margin-top:8px;">
      <pre id="payload"></pre>
    </div>

    <script type="module" src="./main.ts"></script>
    </div>
</body>
</html>
